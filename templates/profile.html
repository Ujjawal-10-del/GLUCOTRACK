{% extends "base.html" %}

{% block content %}

<h2>👤 My Profile</h2>

<hr>

<form method="POST">

<div class="mb-3">
<label>Full Name</label>
<input type="text" class="form-control" name="fullname" value="{{ user.full_name }}">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" class="form-control" value="{{ user.email }}" readonly>
</div>

<div class="mb-3">
<label>Phone Number</label>
<input type="text" class="form-control" name="phone" value="{{ user.phone or '' }}">
</div>

<div class="mb-3">
<label>Gender</label>

<select class="form-control" name="gender">

<option value="">Select Gender</option>

<option value="Male" {% if user.gender=="Male" %}selected{% endif %}>Male</option>

<option value="Female" {% if user.gender=="Female" %}selected{% endif %}>Female</option>

<option value="Other" {% if user.gender=="Other" %}selected{% endif %}>Other</option>

</select>

</div>

<div class="mb-3">
<label>Age</label>
<input type="number" class="form-control" name="age" value="{{ user.age or '' }}">
</div>

<div class="mb-3">
<label>Height (cm)</label>
<input type="number" step="0.1" class="form-control" name="height" value="{{ user.height or '' }}">
</div>

<div class="mb-3">
<label>Weight (kg)</label>
<input type="number" step="0.1" class="form-control" name="weight" value="{{ user.weight or '' }}">
</div>

<button class="btn btn-success">
Update Profile
</button>

</form>

{% endblock %}
